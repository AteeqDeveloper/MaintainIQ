<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaintainIQ — Next-Gen Asset Command Center</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- TAILWIND CSS LIBRARY -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind Custom Configuration for MaintainIQ Premium Theme
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            dark: '#060814',
                            panel: 'rgba(15, 23, 42, 0.65)',
                            border: 'rgba(255, 255, 255, 0.08)',
                            lightBg: '#F4F7FE',
                            lightPanel: 'rgba(255, 255, 255, 0.7)',
                            lightBorder: 'rgba(0, 0, 0, 0.06)'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Core Production Functional Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Custom scrollbar and background gradients using custom tailwind layers */
        body {
            background-color: #060814;
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.04) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.04) 0%, transparent 40%);
            background-attachment: fixed;
            transition: all 0.4s ease;
        }
        html[data-theme="light"] body {
            background-color: #F4F7FE;
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.03) 0%, transparent 40%);
        }
        .text-gradient {
            background: linear-gradient(135deg, #6366F1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="font-sans text-slate-100 antialiased selection:bg-indigo-500 selection:text-white">
    <!-- Main Application Mounting Node Target -->
    <div id="app" class="min-h-screen w-full transition-colors duration-300"></div>

    <script src="./index.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaintainIQ — Next-Gen Asset Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #060814;
            --panel: rgba(15, 23, 42, 0.65);
            --panel-solid: #0f172a;
            --panel-hover: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --primary: #6366F1;
            --primary-gradient: linear-gradient(135deg, #6366F1 0%, #a855f7 50%, #ec4899 100%);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 40px -15px rgba(99, 102, 241, 0.25);
            --radius-lg: 24px;
            --radius-md: 16px;
            --blur: blur(16px);
        }

        [data-theme="light"] {
            --bg: #F4F7FE;
            --panel: rgba(255, 255, 255, 0.7);
            --panel-solid: #ffffff;
            --panel-hover: rgba(241, 245, 249, 0.9);
            --border: rgba(0, 0, 0, 0.06);
            --text: #0F172A;
            --text-muted: #64748B;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px -10px rgba(99, 102, 241, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            background: var(--bg);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Standard Smooth Entry & State Animations */
        @keyframes fluidReveal {
            from {
                transform: translateY(20px);
                opacity: 0;
                filter: blur(5px);
            }

            to {
                transform: translateY(0);
                opacity: 1;
                filter: blur(0);
            }
        }

        @keyframes pulseGlow {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        /* Premium Floating Auth Matrix */
        .auth-container {
            max-width: 440px;
            margin: 80px auto;
            padding: 40px;
            background: var(--panel);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            animation: fluidReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .auth-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            background: var(--panel-hover);
            padding: 6px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .auth-tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 700;
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
        }

        .auth-tab-btn.active {
            background: var(--panel-solid);
            color: var(--text);
            box-shadow: var(--shadow);
            transform: scale(1.02);
        }

        /* Application Shell Framework */
        #app {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: var(--panel);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 20px;
            gap: 8px;
            z-index: 10;
        }

        .main-content {
            flex: 1;
            padding: 48px;
            min-width: 0;
            animation: fluidReveal 0.5s ease-out both;
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 800;
            padding: 0 12px 24px 12px;
            letter-spacing: -0.5px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        /* Magnetic Navigation Elements */
        .nav-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            border: none;
            background: none;
            font-weight: 600;
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .nav-link:hover {
            background: var(--panel-hover);
            color: var(--text);
            transform: translateX(4px);
        }

        .nav-link.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
            font-weight: 700;
        }

        /* Visual Interactive Cards Dashboard Layout */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
        }

        .stat-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 36px;
        }

        .glass-card {
            background: var(--panel);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        /* Premium Form Controls */
        .input-box {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--panel-hover);
            color: var(--text);
            outline: none;
            margin-bottom: 18px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: var(--panel-solid);
        }

        .action-btn {
            background: var(--primary-gradient);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn.secondary {
            background: var(--panel-hover);
            border: 1px solid var(--border);
            color: var(--text);
            box-shadow: none;
        }

        .action-btn.secondary:hover {
            background: var(--panel-solid);
            border-color: var(--text-muted);
            box-shadow: var(--shadow);
        }

        .theme-toggle {
            background: var(--panel);
            border: 1px solid var(--border);
            cursor: pointer;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            color: var(--text);
            font-weight: 600;
            font-size: 13px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--panel-hover);
            transform: scale(1.04);
        }

        /* Status Pills styling */
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        @media(max-width: 768px) {
            #app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 20px;
            }

            .main-content {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script src="./index.js"></script>
</body>

</html>
